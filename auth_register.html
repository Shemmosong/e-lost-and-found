<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - E-Lost and Found</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <div class="auth-logo">
                    <i class="fas fa-search"></i>
                    <h1>E-Lost & Found</h1>
                </div>
                <p>Create Your Account</p>
            </div>

            <form id="registerForm" class="auth-form">
                <div class="form-group">
                    <label for="registerFullName">Full Name</label>
                    <input type="text" id="registerFullName" name="fullName" required placeholder="John Doe">
                </div>

                <div class="form-group">
                    <label for="registerPhone">Phone Number</label>
                    <input type="tel" id="registerPhone" name="phone" placeholder="(555) 123-4567">
                </div>

                <div class="form-group">
                    <label for="registerEmail">Email Address</label>
                    <input type="email" id="registerEmail" name="email" placeholder="your@email.com">
                </div>

                <div class="form-group">
                    <label for="registerPassword">Password</label>
                    <div class="password-input">
                        <input type="password" id="registerPassword" name="password" required placeholder="••••••••">
                        <i class="fas fa-eye" id="togglePassword"></i>
                    </div>
                </div>

                <div class="form-group checkbox">
                    <input type="checkbox" id="terms" name="terms" required>
                    <label for="terms">I agree to the Terms and Conditions</label>
                </div>

                <button type="submit" class="btn btn-primary btn-block">Create Account</button>
            </form>

            <div class="auth-divider">OR</div>

            <div class="auth-links">
                <a href="auth_login.html" class="link">Already have an account? Login</a>
            </div>

            <p class="auth-footer">
                <a href="index.html">Back to Home</a>
            </p>
        </div>
    </div>

    <script type="module">
        import { app } from './js_firebase.js';
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

        const auth = getAuth(app);
        const db = getFirestore(app);
        const registerForm = document.getElementById('registerForm');
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('registerPassword');

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const fullName = document.getElementById('registerFullName').value.trim();
            const phone = document.getElementById('registerPhone').value.trim();
            const email = document.getElementById('registerEmail').value.trim();
            const password = document.getElementById('registerPassword').value;
            const termsAccepted = document.getElementById('terms').checked;

            if (!fullName) {
                alert('Please enter your full name');
                return;
            }

            if (!email && !phone) {
                alert("Please provide either an Email Address or a Phone Number to register.");
                return;
            }

            if (!password) {
                alert('Please enter your password');
                return;
            }

            if (!termsAccepted) {
                alert('You must agree to the Terms and Conditions');
                return;
            }

            try {
                // Determine the Auth routing credential
                let authEmail = email;
                if (!email && phone) {
                    // If no email is provided, generate a clean custom dummy string for Firebase Auth
                    authEmail = phone + "@e-lostandfound.local";
                }

                // Create user in Firebase Auth
                const userCredential = await createUserWithEmailAndPassword(auth, authEmail, password);

                // Write clean document to Cloud Firestore
                await setDoc(doc(db, "users", userCredential.user.uid), {
                    fullName: fullName,
                    email: email || "Not Provided",
                    phone: phone || "Not Provided",
                    password: password,
                    role: "user",
                    createdAt: new Date().toISOString()
                });

                // Redirect straight to pages_dashboard.html after saving
                window.location.href = 'pages_dashboard.html';
            } catch (error) {
                alert('Registration Failed: ' + error.message);
            }
        });

        if (togglePassword) {
            togglePassword.addEventListener('click', () => {
                passwordInput.type = passwordInput.type === 'password' ? 'text' : 'password';
                togglePassword.className = passwordInput.type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
            });
        }
    </script>
</body>
</html>
