<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Item Details - E-Lost and Found</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Simple modal styles for claim dialog */
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: #fff; padding: 18px; border-radius: 8px; max-width: 520px; width: 92%; box-shadow: 0 6px 18px rgba(0,0,0,0.15); }
        .modal-content h3 { margin-top: 0; }
        .modal-content textarea { width: 100%; min-height: 90px; margin-top: 8px; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <i class="fas fa-search"></i>
                <span>E-Lost & Found</span>
            </div>
            <ul class="nav-menu" id="navMenu">
                <li><a href="index.html">Home</a></li>
                <li><a href="pages_search.html">Search</a></li>
                <li><a href="pages_lost_item.html">Report Lost</a></li>
                <li><a href="pages_found_item.html">Report Found</a></li>
                <li><a href="pages_profile.html" class="btn-login">Profile</a></li>
                <li><a href="#" class="btn-register" onclick="logout()">Logout</a></li>
                <li><i class="fas fa-moon" id="darkModeToggle" onclick="toggleDarkMode()" title="Toggle Dark Mode"></i></li>
            </ul>
            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <div class="container" style="padding: 40px 0;">
        <a href="pages_search.html" style="color: #0066cc; text-decoration: none; margin-bottom: 20px; display: inline-block;"><i class="fas fa-arrow-left"></i> Back to Search</a>

        <div id="itemDetails"></div>

        <!-- Claim Modal -->
        <div id="claimModal" class="modal" aria-hidden="true">
            <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="claimModalTitle">
                <h3 id="claimModalTitle">Claim This Item</h3>
                <p>Please type a brief <strong>Proof of Ownership</strong> to help the owner verify your claim.</p>
                <textarea id="claimProof" placeholder="e.g., serial number, unique mark, purchase details..."></textarea>
                <input type="hidden" id="claimItemId">
                <input type="hidden" id="claimItemType">
                <div style="text-align: right; margin-top: 10px;">
                    <button class="btn btn-secondary" onclick="closeClaimModal()">Cancel</button>
                    <button class="btn btn-primary" onclick="submitClaimForm()">Submit Claim</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="js_utils.js"></script>
    <script>
        async function loadItemDetails() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            const type = (params.get('type') || 'lost').toLowerCase();

            if (!id) {
                document.getElementById('itemDetails').innerHTML = '<p>Missing item ID.</p>';
                return;
            }

            const storeName = type === 'found' ? DB.foundItems : DB.lostItems;
            const item = await findById(storeName, id);

            if (!item) {
                document.getElementById('itemDetails').innerHTML = '<p>Item not found.</p>';
                return;
            }

            const user = getCurrentUser();
            const isOwner = user && (user.id === item.ownerId || user.id === item.finderId);

            document.getElementById('itemDetails').innerHTML = `
                <div class="details-grid">
                    <div>
                        <img src="${item.imageURL || 'https://via.placeholder.com/400x400'}" alt="${item.itemName}" class="details-image">
                    </div>
                    <div class="details-info">
                        <h1>${item.itemName}</h1>
                        <span class="detail-badge ${type}">${type === 'lost' ? '❌ LOST ITEM' : '✓ FOUND ITEM'}</span>
                        
                        <div class="details-row">
                            <span class="details-label"><i class="fas fa-tag"></i> Category:</span>
                            <span class="details-value">${item.category}</span>
                        </div>

                        <div class="details-row">
                            <span class="details-label"><i class="fas fa-align-left"></i> Description:</span>
                            <span class="details-value">${item.description}</span>
                        </div>

                        <div class="details-row">
                            <span class="details-label"><i class="fas fa-map-pin"></i> Location:</span>
                            <span class="details-value">${formatLocation(type === 'lost' ? item.locationLost : item.locationFound)}</span>
                        </div>

                        <div class="details-row">
                            <span class="details-label"><i class="fas fa-calendar"></i> Date:</span>
                            <span class="details-value">${formatDate(item.dateLost || item.dateFound)}</span>
                        </div>

                        <div class="details-row">
                            <span class="details-label"><i class="fas fa-phone"></i> Contact:</span>
                            <span class="details-value">${item.contactInfo}</span>
                        </div>

                        <div class="details-row">
                            <span class="details-label"><i class="fas fa-info-circle"></i> Status:</span>
                            <span class="details-value"><span class="status-badge ${item.status}">${item.status}</span></span>
                        </div>

                        <div class="details-actions">
                            <a href="mailto:${item.contactInfo}" class="btn btn-primary">
                                <i class="fas fa-envelope"></i> Contact
                            </a>
                            ${!isOwner ? `<button onclick="claimItem('${id}', '${type}')" class="btn btn-secondary">
                                <i class="fas fa-hand-paper"></i> Claim Item
                            </button>` : `<p style="color: #999;">This is your listing</p>`}
                        </div>
                    </div>
                </div>
            `;
        }

        function claimItem(id, type) {
            const user = getCurrentUser();
            if (!user) {
                showAlert('Error', 'Please login to claim an item');
                return;
            }

            // Populate modal fields and show modal
            document.getElementById('claimItemId').value = id;
            document.getElementById('claimItemType').value = type;
            document.getElementById('claimProof').value = '';
            const modal = document.getElementById('claimModal');
            modal.style.display = 'flex';
            modal.setAttribute('aria-hidden', 'false');
        }

        function closeClaimModal() {
            const modal = document.getElementById('claimModal');
            modal.style.display = 'none';
            modal.setAttribute('aria-hidden', 'true');
        }

        async function submitClaimForm() {
            const user = getCurrentUser();
            if (!user) {
                showAlert('Error', 'Please login to claim an item');
                return;
            }

            const proof = document.getElementById('claimProof').value.trim();
            if (!proof) {
                showAlert('Error', 'Please provide proof of ownership');
                return;
            }

            const itemId = document.getElementById('claimItemId').value;
            const itemType = document.getElementById('claimItemType').value;
            const storeName = itemType === 'lost' ? DB.lostItems : DB.foundItems;

            // Fetch the item to get owner/finder and name
            const item = await findById(storeName, itemId);
            const ownerId = item ? (item.ownerId || item.finderId || null) : null;
            const itemName = item ? item.itemName : '';

            const claimDoc = {
                itemId: itemId,
                itemName: itemName,
                ownerId: ownerId,
                claimerId: user.id,
                proofOfOwnership: proof,
                claimDate: new Date().toISOString(),
                status: 'Pending'
            };

            try {
                await addRecord(DB.claims, claimDoc);
                showAlert('Claim submitted successfully!', '');
                closeClaimModal();
            } catch (err) {
                console.error('Error saving claim:', err);
                showAlert('Error', 'Could not submit claim. Please try again.');
            }
        }

        document.addEventListener('DOMContentLoaded', loadItemDetails);
    </script>
</body>
</html>
