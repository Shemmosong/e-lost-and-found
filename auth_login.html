<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - E-Lost and Found</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <div class="auth-logo">
                    <i class="fas fa-search"></i>
                    <h1>E-Lost & Found</h1>
                </div>
                <p>Welcome Back</p>
            </div>

            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="loginIdentifier">Email Address or Phone Number</label>
                    <input type="text" id="loginIdentifier" name="identifier" required placeholder="your@email.com or (555) 123-4567">
                </div>

                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <div class="password-input">
                        <input type="password" id="loginPassword" name="password" required placeholder="********">
                        <i class="fas fa-eye" id="togglePassword"></i>
                    </div>
                </div>

                <div class="form-group checkbox">
                    <input type="checkbox" id="remember" name="remember">
                    <label for="remember">Remember me</label>
                </div>

                <button type="submit" class="btn btn-primary btn-block">Login</button>
            </form>

            <div class="auth-divider">OR</div>

            <div class="auth-links">
                <a href="auth_forgot_password.html" class="link">Forgot Password?</a>
                <span>-</span>
                <a href="auth_register.html" class="link">Create Account</a>
            </div>

            <p class="auth-footer">
                <a href="index.html">Back to Home</a>
            </p>
        </div>
    </div>

    <div id="loginLoadingOverlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,0.85);z-index:9999;align-items:center;justify-content:center;flex-direction:column;">
        <div style="font-size:18px;color:#333;margin-bottom:12px;"><i class="fas fa-spinner fa-pulse"></i> Signing you in...</div>
        <div style="font-size:13px;color:#666;max-width:320px;text-align:center;">Fetching your profile — please wait.</div>
    </div>

    <script type="module">
        import { app } from './js_firebase.js';
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import {
            getAuth,
            signInWithEmailAndPassword,
            onAuthStateChanged
        } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
        import { setCurrentUser } from './js_utils.js';

        const auth = getAuth(app);
        const db = getFirestore(app);
        const loginForm = document.getElementById('loginForm');
        const identifierInput = document.getElementById('loginIdentifier');
        const passwordInput = document.getElementById('loginPassword');
        const togglePassword = document.getElementById('togglePassword');
        const loadingOverlay = document.getElementById('loginLoadingOverlay');

        function setLoginFormDisabled(disabled) {
            Array.from(loginForm.querySelectorAll('input, button')).forEach((element) => {
                element.disabled = disabled;
            });
        }

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();

            let identifier = identifierInput.value.trim();
            const password = passwordInput.value;

            if (!identifier) {
                alert("Error: The script could not read your email or phone number input. Please double check your HTML input ID configuration.");
                return;
            }

            if (!password) {
                alert('Please enter your password');
                return;
            }

            // Check if identifier is a phone number (no '@' symbol)
            if (!identifier.includes('@')) {
                identifier = identifier + "@e-lostandfound.local";
            }

            setLoginFormDisabled(true);
            if (loadingOverlay) {
                loadingOverlay.style.display = 'flex';
            }

            console.log("Attempting login with Identifier:", identifierInput.value.trim(), "and Password:", password);

            signInWithEmailAndPassword(auth, identifier, password)
                .then(async (userCredential) => {
                    console.log("Auth successful! Checking user session...");
                    window.location.href = "pages_dashboard.html";
                })
                .catch((error) => {
                    console.error("Login Error:", error.code, error.message);
                    alert("Login Failed: " + error.message);

                    if (loadingOverlay) {
                        loadingOverlay.style.display = 'none';
                    }
                    setLoginFormDisabled(false);
                });
        });

        if (togglePassword) {
            togglePassword.addEventListener('click', () => {
                passwordInput.type = passwordInput.type === 'password' ? 'text' : 'password';
                togglePassword.className = passwordInput.type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
            });
        }

    </script>
</body>
</html>
