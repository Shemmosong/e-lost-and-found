<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - E-Lost and Found</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <div class="auth-logo">
                    <i class="fas fa-search"></i>
                    <h1>E-Lost & Found</h1>
                </div>
                <p>Welcome Back</p>
            </div>

            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="loginIdentifier">Email or Phone Number</label>
                    <input type="text" id="loginIdentifier" name="loginIdentifier" required placeholder="your@email.com or 0712345678">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-input">
                        <input type="password" id="password" name="password" placeholder="********">
                        <i class="fas fa-eye" id="togglePassword"></i>
                    </div>
                </div>

                <div id="recaptcha-container"></div>

                <div class="form-group checkbox">
                    <input type="checkbox" id="remember" name="remember">
                    <label for="remember">Remember me</label>
                </div>

                <button type="submit" class="btn btn-primary btn-block">Login</button>
            </form>

            <div class="auth-divider">OR</div>

            <div class="auth-links">
                <a href="auth_forgot_password.html" class="link">Forgot Password?</a>
                <span>-</span>
                <a href="auth_register.html" class="link">Create Account</a>
            </div>

            <p class="auth-footer">
                <a href="index.html">Back to Home</a>
            </p>
        </div>
    </div>

    <div id="otpVerificationModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:2000; align-items:center; justify-content:center; flex-direction:column;">
        <div style="background:#fff; padding:30px; border-radius:8px; width:350px; max-width:90%; text-align:center;">
            <h3>Verify Your Phone</h3>
            <p id="otpMessage" style="color:#666; font-size:13px; margin:10px 0;">Enter the 6-digit code sent to your phone</p>
            <input id="otpInput" type="text" maxlength="6" placeholder="000000" style="width:100%; padding:12px; margin:15px 0; font-size:18px; text-align:center; border:1px solid #ddd; border-radius:4px;" />
            <div style="display:flex; gap:10px; justify-content:center; margin:20px 0;">
                <button id="confirmOtpBtn" class="btn btn-primary">Verify</button>
                <button id="cancelOtpBtn" class="btn">Cancel</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { app, db } from './js_firebase.js';
        import { setCurrentUser, showAlert, showToast } from './js_utils.js';
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
        import {
            getAuth,
            RecaptchaVerifier,
            signInWithEmailAndPassword,
            signInWithPhoneNumber
        } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

        const auth = getAuth(app);
        const loginForm = document.getElementById('loginForm');
        const loginIdentifierInput = document.getElementById('loginIdentifier');
        const passwordInput = document.getElementById('password');
        const togglePassword = document.getElementById('togglePassword');
        const otpModal = document.getElementById('otpVerificationModal');
        const otpInput = document.getElementById('otpInput');
        const otpMessage = document.getElementById('otpMessage');
        const confirmOtpBtn = document.getElementById('confirmOtpBtn');
        const cancelOtpBtn = document.getElementById('cancelOtpBtn');

        let confirmationResult = null;

        function initializeRecaptchaVerifier() {
            if (window.recaptchaVerifier) {
                return window.recaptchaVerifier;
            }

            window.recaptchaVerifier = new RecaptchaVerifier(auth, "recaptcha-container", {
                "size": "invisible"
            });

            return window.recaptchaVerifier;
        }

        function resetRecaptchaVerifier() {
            if (window.recaptchaVerifier) {
                try {
                    window.recaptchaVerifier.clear();
                } catch (err) {
                    console.warn('Unable to clear reCAPTCHA verifier:', err);
                }
            }

            window.recaptchaVerifier = null;
            initializeRecaptchaVerifier();
        }

        function formatPhoneForFirebase(phoneValue) {
            let formattedPhone = (phoneValue || '').trim();
            formattedPhone = formattedPhone.replace(/[\s-]/g, '');

            if (formattedPhone.startsWith('0')) {
                formattedPhone = `+254${formattedPhone.slice(1)}`;
            } else if (!formattedPhone.startsWith('+')) {
                formattedPhone = `+254${formattedPhone}`;
            }

            return formattedPhone;
        }

        function setLoginFormDisabled(disabled) {
            Array.from(loginForm.querySelectorAll('input, button')).forEach((element) => {
                element.disabled = disabled;
            });
        }

        function showOtpModal(show = true) {
            otpModal.style.display = show ? 'flex' : 'none';

            if (show) {
                otpInput.focus();
            } else {
                otpInput.value = '';
            }
        }

        async function finishLogin(userCredential) {
            const { user } = userCredential;
            const profileSnapshot = await getDoc(doc(db, "users", user.uid));
            const profile = profileSnapshot.exists()
                ? profileSnapshot.data()
                : {
                    fullName: user.displayName || '',
                    email: user.email || '',
                    phone: user.phoneNumber || '',
                    role: 'user',
                    profileImage: null
                };

            setCurrentUser({ id: user.uid, ...profile });
            showToast('Login successful!');
            window.location.href = "pages_dashboard.html";
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const identifier = loginIdentifierInput.value.trim();

            if (!identifier) {
                showAlert('Validation Error', 'Please enter your email or phone number');
                return;
            }

            setLoginFormDisabled(true);

            if (identifier.includes('@')) {
                const password = passwordInput.value;

                if (!password) {
                    showAlert('Validation Error', 'Please enter your password');
                    setLoginFormDisabled(false);
                    return;
                }

                try {
                    const userCredential = await signInWithEmailAndPassword(auth, identifier, password);
                    await finishLogin(userCredential);
                } catch (err) {
                    console.error('Email login error:', err);
                    showAlert('Login Failed', err.message || 'Unable to sign in with email');
                    setLoginFormDisabled(false);
                }

                return;
            }

            const formattedPhone = formatPhoneForFirebase(identifier);

            try {
                const appVerifier = initializeRecaptchaVerifier();
                confirmationResult = await signInWithPhoneNumber(auth, formattedPhone, appVerifier);
                otpMessage.textContent = `A 6-digit code was sent to ${formattedPhone}`;
                showOtpModal(true);
            } catch (err) {
                console.error('Phone login error:', err);
                showAlert('Phone Error', err.message || 'Unable to send a verification code');
                resetRecaptchaVerifier();
                setLoginFormDisabled(false);
            }
        });

        confirmOtpBtn.addEventListener('click', async () => {
            const code = otpInput.value.trim();

            if (!confirmationResult) {
                showAlert('Verification Error', 'Phone verification was not initialized');
                return;
            }

            if (!code || code.length !== 6) {
                showAlert('Invalid Code', 'Please enter the 6-digit verification code');
                return;
            }

            try {
                const userCredential = await confirmationResult.confirm(code);
                showOtpModal(false);
                await finishLogin(userCredential);
            } catch (err) {
                console.error('Phone confirmation error:', err);
                showAlert('Verification Error', err.message || 'Invalid verification code');
            }
        });

        cancelOtpBtn.addEventListener('click', () => {
            confirmationResult = null;
            showOtpModal(false);
            setLoginFormDisabled(false);
            resetRecaptchaVerifier();
        });

        if (togglePassword) {
            togglePassword.addEventListener('click', () => {
                passwordInput.type = passwordInput.type === 'password' ? 'text' : 'password';
                togglePassword.className = passwordInput.type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
            });
        }

        initializeRecaptchaVerifier();
    </script>
</body>
</html>
