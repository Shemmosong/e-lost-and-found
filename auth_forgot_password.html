<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - E-Lost and Found</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <div class="auth-logo">
                    <i class="fas fa-search"></i>
                    <h1>E-Lost & Found</h1>
                </div>
                <p>Reset Your Password</p>
            </div>

            <form id="forgotForm" class="auth-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="your@email.com">
                </div>

                <p style="font-size: 14px; color: #666; margin-bottom: 20px;">
                    Enter your email address and we'll send you a link to reset your password.
                </p>

                <button type="submit" class="btn btn-primary btn-block">Send Reset Link</button>
            </form>

            <div class="auth-divider">OR</div>

            <div class="auth-links">
                <a href="auth_login.html" class="link">Back to Login</a>
                <span>•</span>
                <a href="auth_register.html" class="link">Create Account</a>
            </div>

            <p class="auth-footer">
                <a href="index.html">Back to Home</a>
            </p>
        </div>
    </div>

    <script type="module" src="js_utils.js"></script>
    <script type="module" src="js_auth.js"></script>
</body>
</html>
