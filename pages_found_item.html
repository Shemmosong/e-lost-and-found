<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Found Item - E-Lost and Found</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <i class="fas fa-search"></i>
                <span>E-Lost & Found</span>
            </div>
            <ul class="nav-menu" id="navMenu">
                <li><a href="index.html">Home</a></li>
                <li><a href="pages_search.html">Search</a></li>
                <li><a href="pages_lost_item.html">Report Lost</a></li>
                <li><a href="pages_found_item.html">Report Found</a></li>
                <li><a href="pages_profile.html" class="btn-login">Profile</a></li>
                <li><a href="#" class="btn-register" onclick="logout()">Logout</a></li>
                <li><i class="fas fa-moon" id="darkModeToggle" onclick="toggleDarkMode()" title="Toggle Dark Mode"></i></li>
            </ul>
            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <div class="container" style="padding: 40px 0;">
        <h1 style="margin-bottom: 30px;"><i class="fas fa-check-circle"></i> Report a Found Item</h1>

        <div class="card" style="max-width: 600px;">
            <form id="foundItemForm">
                <div class="form-group">
                    <label for="itemName">Item Name *</label>
                    <input type="text" id="itemName" required placeholder="e.g., Blue Backpack">
                </div>

                <div class="form-group">
                    <label for="category">Category *</label>
                    <select id="category" required>
                        <option value="">Select Category</option>
                        <option value="jewelry">Jewelry</option>
                        <option value="electronics">Electronics</option>
                        <option value="documents">Documents</option>
                        <option value="clothing">Clothing</option>
                        <option value="accessories">Accessories</option>
                        <option value="keys">Keys</option>
                        <option value="wallet">Wallet</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="description">Description *</label>
                    <textarea id="description" rows="4" required placeholder="Describe the item in detail, including condition, any markings, contents, etc."></textarea>
                </div>

                <div class="form-group">
                    <label for="locationFound">Location Found *</label>
                    <input type="text" id="locationFound" required placeholder="e.g., Central Park, near the fountain">
                </div>

                <div class="form-group">
                    <label for="dateFound">Date Found *</label>
                    <input type="date" id="dateFound" required>
                </div>

                <div class="form-group">
                    <label for="imageUpload">Upload Photo (Optional)</label>
                        <input type="file" id="imageUpload" accept="image/*">
                        <small style="color: #999;">Supports JPG, PNG, GIF</small>
                        <img id="imagePreview" style="margin-top: 10px; max-width: 200px; display: none; border-radius: 5px;">
                </div>

                <div class="form-group">
                    <label for="contactInfo">Your Contact Information *</label>
                    <input type="text" id="contactInfo" required placeholder="Phone or Email">
                </div>

                <div class="form-group checkbox">
                    <input type="checkbox" id="terms" required>
                    <label for="terms">I confirm this information is accurate</label>
                </div>

                <button type="submit" class="btn btn-primary btn-block">Report Found Item</button>
                <a href="pages_dashboard.html" class="btn btn-block" style="background-color: #999; color: white; text-align: center; margin-top: 10px; text-decoration: none;">Cancel</a>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { addDoc, collection } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDTrRVndMD7GBamuOf-sEGk9O2VXN41xK4",
            authDomain: "e-lost-and-found-d7d2b.firebaseapp.com",
            projectId: "e-lost-and-found-d7d2b",
            storageBucket: "e-lost-and-found-d7d2b.appspot.com",
            messagingSenderId: "285405475724",
            appId: "1:285405475724:web:82707326f367d6e81c5ca9"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let reportingUser = null;
        let reportFormReady = false;

        function convertImageToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        function showAlert(title, message) {
            alert(`${title}: ${message}`);
        }

        function initializeEmailJs() {
            if (window.emailjs) {
                emailjs.init("YOUR_PUBLIC_KEY");
            } else {
                console.warn('EmailJS script not loaded yet');
            }
        }

        async function sendReportConfirmation(templateParams) {
            if (!window.emailjs || !emailjs.send) {
                throw new Error('EmailJS is unavailable.');
            }
            return await emailjs.send("YOUR_SERVICE_ID", "YOUR_TEMPLATE_ID", templateParams);
        }

        function initializeReportPage() {
            if (reportFormReady) return;
            reportFormReady = true;

            initializeEmailJs();

            document.getElementById('imageUpload').addEventListener('change', async (e) => {
                const file = e.target.files[0];
                if (file) {
                    const base64 = await convertImageToBase64(file);
                    document.getElementById('imagePreview').src = base64;
                    document.getElementById('imagePreview').style.display = 'block';
                }
            });

            document.getElementById('foundItemForm').addEventListener('submit', async (e) => {
                e.preventDefault();

                if (!reportingUser) {
                    showAlert('Error', 'Please login first');
                    return;
                }

                const item = {
                    itemName: document.getElementById('itemName').value,
                    category: document.getElementById('category').value,
                    description: document.getElementById('description').value,
                    locationFound: document.getElementById('locationFound').value,
                    dateFound: document.getElementById('dateFound').value,
                    imageURL: document.getElementById('imagePreview').src || null,
                    finderId: reportingUser.uid,
                    status: 'available',
                    contactInfo: document.getElementById('contactInfo').value,
                    createdAt: new Date().toISOString()
                };

                const savedItem = await addDoc(collection(db, 'foundItems'), item);
                if (!savedItem) {
                    showAlert('Error', 'Unable to save your report. Please try again.');
                    return;
                }

                const templateParams = {
                    user_email: reportingUser.email,
                    user_name: reportingUser.displayName || reportingUser.email,
                    item_name: item.itemName,
                    item_description: item.description,
                    date_reported: new Date(item.createdAt).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' })
                };

                try {
                    await sendReportConfirmation(templateParams);
                    showAlert('Success', 'Found item reported successfully and confirmation email sent!');
                    setTimeout(() => {
                        window.location.assign('pages_dashboard.html');
                    }, 1500);
                } catch (error) {
                    console.error('EmailJS send error:', error);
                    showAlert('Email Error', 'Your report was saved, but we could not send the confirmation email. Please try again later.');
                }
            });
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                reportingUser = user;
                console.log("Access granted for reporting profile UID:", user.uid);
                // Page logic is safe to run here!
                initializeReportPage();
            } else {
                console.log("No authorization token detected. Routing back to login layout page.");
                window.location.href = "auth_login.html";
            }
        });

        window.logout = () => {
            localStorage.removeItem('currentUser');
            window.location.assign('index.html');
        };

        window.toggleDarkMode = () => {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
        };
    </script>
</body>
</html>
